version: "3.8"

services:
  db-product:
    image: postgres:16-alpine
    container_name: warkop-db-product
    environment:
      POSTGRES_DB: warkop_product
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-order:
    image: postgres:16-alpine
    container_name: warkop-db-order
    environment:
      POSTGRES_DB: warkop_order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build: ./product-service
    container_name: warkop-product-service
    environment:
      DB_HOST: db-product
      DB_PORT: 5432
      DB_NAME: warkop_product
      DB_USER: postgres
      DB_PASS: postgres
    ports:
      - "8081:8081"
    depends_on:
      db-product:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: warkop-order-service
    environment:
      DB_HOST: db-order
      DB_PORT: 5432
      DB_NAME: warkop_order
      DB_USER: postgres
      DB_PASS: postgres
      PRODUCT_SERVICE_URL: http://product-service:8081
    ports:
      - "8082:8082"
    depends_on:
      db-order:
        condition: service_healthy
      product-service:
        condition: service_started
