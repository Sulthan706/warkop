server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:warkop_product}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: create        # untuk demo: tabel dibuat ulang setiap start
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always            # jalankan data.sql (seed data) saat start
